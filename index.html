<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hi-Lo Counter</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}
.zone{width:100%;height:50vh;display:flex;align-items:center;justify-content:center;font-size:20vw}
#plus{background:#1b7f3b}
#minus{background:#8e2323}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;padding:20px;border-radius:15px;text-align:center}
button,input{padding:10px;font-size:16px;margin:5px}
</style>
</head>
<body>

<div id="plus" class="zone">+</div>
<div id="minus" class="zone">−</div>

<div class="panel">
<div id="count">0</div>
<input id="decks" placeholder="balíky">
<br>
<button onclick="calc()">True Count</button>
<button onclick="reset()">Reset</button>
<div id="true">-</div>
</div>

<script>
let c=0;
plus.onclick=()=>{c++;count.innerText=c;}
minus.onclick=()=>{c--;count.innerText=c;}
function calc(){
let d=parseFloat(decks.value);
if(!d)return;
true.innerText=(c/d).toFixed(2);
}
function reset(){
c=0;count.innerText=0;true.innerText="-";
}
</script>

</body>
</html>
